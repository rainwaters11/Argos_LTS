[profile.default]
bytecode_hash = "none"
evm_version = "cancun"
ffi = true
fs_permissions = [{access = "read-write", path = ".forge-snapshots/"}]
libs = ["lib"]
out = "out"
solc_version = "0.8.30"
src = "src"
via_ir = false

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"
unichain_mainnet = "${UNICHAIN_MAINNET_RPC}"

# Blockscout verification (no API key required for Unichain Sepolia)
# Usage: forge script ... --verify --verifier blockscout \
#          --verifier-url https://unichain-sepolia.blockscout.com/api/
[etherscan]
unichain_sepolia = { key = "${BLOCKSCOUT_API_KEY}", url = "https://unichain-sepolia.blockscout.com/api/", chain = 1301 }
